<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissor</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Rock Paper Scissors ✊📄✂️</h1>

    <div class="choices">
      <img src="Images/rock.jpg" alt="Rock" onclick="play('rock')" />
      <img src="Images/paper.jpg" alt="Paper" onclick="play('paper')" />
      <img src="Images/scissor.jpg" alt="Scissor" onclick="play('scissor')" />
    </div>

    <div class="result">
      <p id="user-choice">Your Choice:</p>
      <p id="computer-choice">Computer Choice:</p>
      <h2 id="winner">Result:</h2>
    </div>

    <div class="scoreboard">
      <p>You: <span id="user-score">0</span></p>
      <p>Computer: <span id="computer-score">0</span></p>
    </div>
    <p id="message">Play your move</p>

    <script src="script.js"></script>
  </body>
</html>
